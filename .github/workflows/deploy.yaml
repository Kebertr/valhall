name: CI Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read
  packages: write

jobs:
  frontend:
    name: Frontend checks
    runs-on: valhall

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Test frontend
        working-directory: frontend
        run: npm test -- --run

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  backend:
    name: Backend checks
    runs-on: valhall

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: services/bong-api/package-lock.json

      - name: Install dependencies
        working-directory: services/bong-api
        run: npm ci

      - name: Generate Prisma client
        working-directory: services/bong-api
        run: npx prisma generate

      - name: Lint backend
        working-directory: services/bong-api
        run: npm run lint

      - name: Test backend
        working-directory: services/bong-api
        run: npm test

      - name: Build backend
        working-directory: services/bong-api
        run: npm run build

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: services/member-api/package-lock.json

      - name: Install dependencies
        working-directory: services/member-api
        run: npm ci

      - name: Generate Prisma client
        working-directory: services/member-api
        run: npx prisma generate

      - name: Lint backend
        working-directory: services/member-api
        run: npm run lint

      
      #- name: Test backend
      #  working-directory: services/member-api
      #  run: npm test
      
      - name: Build backend
        working-directory: services/member-api
        run: npm run build

  docker-images:
    name: Build and push Docker images
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set image tag
        run: |
          SHORT_SHA=${GITHUB_SHA::7}

          if [ "${GITHUB_REF_NAME}" = "dev" ]; then
            echo "IMAGE_TAG=dev-$SHORT_SHA" >> $GITHUB_ENV
          elif [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "IMAGE_TAG=prod-$SHORT_SHA" >> $GITHUB_ENV
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push changed images
        run: |
          CHANGED=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")

          if [ "${GITHUB_REF_NAME}" = "dev" ]; then
            VITE_API_URL=https://dev-valhall.kebert.se
            VITE_KEYCLOAK_CLIENT_ID=valhall-frontend-dev
          else
            VITE_API_URL=https://valhall.kebert.se
            VITE_KEYCLOAK_CLIENT_ID=valhall-frontend
          fi

          VITE_KEYCLOAK_URL=https://auth.kebert.se
          VITE_KEYCLOAK_REALM=valhall

          if echo "$CHANGED" | grep -q '^frontend/'; then
            docker build \
              --build-arg VITE_API_URL=$VITE_API_URL \
              --build-arg VITE_KEYCLOAK_URL=$VITE_KEYCLOAK_URL \
              --build-arg VITE_KEYCLOAK_REALM=$VITE_KEYCLOAK_REALM \
              --build-arg VITE_KEYCLOAK_CLIENT_ID=$VITE_KEYCLOAK_CLIENT_ID \
              -t ghcr.io/kebertr/valhall-frontend:${IMAGE_TAG} \
              ./frontend
            docker push ghcr.io/kebertr/valhall-frontend:${IMAGE_TAG}
          fi

          if echo "$CHANGED" | grep -q '^services/bong-api/'; then
            docker build \
              -t ghcr.io/kebertr/valhall-bong-api:${IMAGE_TAG} \
              ./services/bong-api
            docker push ghcr.io/kebertr/valhall-bong-api:${IMAGE_TAG}
          fi

          if echo "$CHANGED" | grep -q '^services/member-api/'; then
            docker build \
              -t ghcr.io/kebertr/valhall-member-api:${IMAGE_TAG} \
              ./services/member-api
            docker push ghcr.io/kebertr/valhall-member-api:${IMAGE_TAG}
          fi
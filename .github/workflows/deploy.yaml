name: CI Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  frontend:
    name: Frontend checks
    runs-on: valhall

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Test frontend
        working-directory: frontend
        run: npm test -- --run

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  backend:
    name: Backend checks
    runs-on: valhall

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: services/bong-api/package-lock.json

      - name: Install dependencies
        working-directory: services/bong-api
        run: npm ci

      - name: Generate Prisma client
        working-directory: services/bong-api
        run: npx prisma generate

      - name: Lint backend
        working-directory: services/bong-api
        run: npm run lint

      - name: Test backend
        working-directory: services/bong-api
        run: npm test

      - name: Build backend
        working-directory: services/bong-api
        run: npm run build

  docker-images:
    name: Build and push Docker images
    runs-on: [self-hosted, valhall]
    needs: [frontend, backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build frontend image
        run: |
          docker build \
            --build-arg VITE_API_URL=https://valhall.kebert.se \
            -t ghcr.io/kebertr/valhall-frontend:latest \
            ./frontend

      - name: Push frontend image
        run: docker push ghcr.io/kebertr/valhall-frontend:latest

      - name: Build bong-api image
        run: |
          docker build \
            -t ghcr.io/kebertr/valhall-bong-api:latest \
            ./services/bong-api

      - name: Push bong-api image
        run: docker push ghcr.io/kebertr/valhall-bong-api:latest

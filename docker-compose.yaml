version: "3.9"

services:
  postgres-bong:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB_BONG}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB_BONG}"]
      interval: 3s
      retries: 10
    ports:
      - "5433:5432"
    volumes:
      - bong-db-data:/var/lib/postgresql/data
    networks:
      - app-network

  postgres-member:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB_MEMBER}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB_MEMBER}"]
      interval: 3s
      retries: 10
    ports:
      - "5434:5432"
    volumes:
      - member-db-data:/var/lib/postgresql/data
    networks:
      - app-network

  bong-api:
    build:
      context: ./services/bong-api
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-bong:5432/${POSTGRES_DB_BONG}
    depends_on:
      postgres-bong:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3000
    ports:
      - "5173:5173"
    depends_on:
      - bong-api


volumes:
  bong-db-data:
  member-db-data:

networks:
  app-network:
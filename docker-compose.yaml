version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 3s
      retries: 10
    ports:
      - "5433:5432"
    volumes:
      - bong-db-data:/var/lib/postgresql/data
    networks:
      - app-network
  bong-api:
    build:
      context: ./services/bong-api
      dockerfile: Dockerfile
    image: ghcr.io/kebertr/valhall-bong-api:latest
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3000
    image: ghcr.io/kebertr/valhall-frontend:latest
    ports:
      - "5173:5173"
    depends_on:
      - bong-api


volumes:
  bong-db-data:

networks:
  app-network:
version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 3s
      retries: 10
    ports:
      - "5433:5432"
    volumes:
      - bong-db-data:/var/lib/postgresql/data
    networks:
      - app-network
volumes:
  bong-db-data:

networks:
  app-network: